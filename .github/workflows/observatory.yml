name: observatory

# Security posture (design decision, Arch review): this workflow holds real
# credentials (aggregator API keys + a staging-repo PAT), so it triggers ONLY
# on schedule and manual dispatch — never pull_request / pull_request_target,
# which would expose secrets to fork code. Secrets are environment-scoped;
# require review on changes to this file.
on:
  schedule:
    - cron: "17 3 * * *"    # nightly; a second entry can hedge cron flakiness
  workflow_dispatch: {}

# Serialize runs so the redundant cron + manual dispatch can't double-commit
# or race on push. Queue, don't cancel — a half-finished run should complete.
concurrency:
  group: observatory-nightly
  cancel-in-progress: false

permissions:
  contents: write          # commit data/ to this (public) repo
  # NOTE: default GITHUB_TOKEN CANNOT write the private staging repo.
  # Provide STAGING_PAT (fine-grained, staging repo only) as a secret.

jobs:
  probe:
    runs-on: ubuntu-latest
    environment: observatory          # environment-scoped secrets live here
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pinned provenance-probe + deps
        run: |
          pip install "provenance-probe==0.4.1"   # pin the engine version
          pip install pyyaml
      - name: Run nightly probes
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          STAGING_PAT: ${{ secrets.STAGING_PAT }}
        run: python runner/run.py --targets targets.yaml
      - name: Commit neutral evidence
        run: |
          git config user.name "observatory-bot"
          git config user.email "observatory-bot@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "data: nightly probe $(date -u +%F)"
          git push
      # TODO: a build-and-deploy Pages job that renders site/ from data/,
      # publishing ONLY neutral evidence until Gate 1 clears interpreted verdicts.
