name: observatory

# Security posture (design decision, Arch review): this workflow holds real
# credentials (aggregator API keys + a staging-repo PAT), so it triggers ONLY
# on schedule and manual dispatch — never pull_request / pull_request_target,
# which would expose secrets to fork code. Secrets are environment-scoped;
# require review on changes to this file.
on:
  schedule:
    - cron: "17 3 * * *"    # nightly; a second entry can hedge cron flakiness
  workflow_dispatch: {}

# Serialize runs so the redundant cron + manual dispatch can't double-commit
# or race on push. Queue, don't cancel — a half-finished run should complete.
concurrency:
  group: observatory-nightly
  cancel-in-progress: false

permissions:
  contents: write          # commit data/ to this (public) repo
  # NOTE: default GITHUB_TOKEN CANNOT write the private staging repo.
  # Provide STAGING_PAT (fine-grained, staging repo only) as a secret.

jobs:
  probe:
    runs-on: ubuntu-latest
    environment: observatory          # environment-scoped secrets live here
    permissions:
      contents: write                 # commit data/
      id-token: write                 # cosign keyless OIDC identity
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install provenance-probe + deps
        run: |
          pip install "git+https://github.com/lobster-shrimp/provenance-probe.git@main"
          pip install pyyaml
      - uses: sigstore/cosign-installer@v3   # cosign for keyless evidence signing
      - name: Run nightly probes (builds + signs the day's manifest)
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}   # live CN positive control
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}       # live US negative control
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          STAGING_PAT: ${{ secrets.STAGING_PAT }}
          COSIGN_YES: "true"
        run: python runner/run.py --targets targets.yaml
      - name: Commit neutral evidence + signed manifest
        run: |
          git config user.name "observatory-bot"
          git config user.email "observatory-bot@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "data: nightly probe $(date -u +%F)"
          git push

  # Render the Variant C site from data/ and keep it as a downloadable artifact.
  # Public Pages DEPLOYMENT is deliberately deferred: the repo is private and
  # nothing goes public until Gate 1. To publish later, enable GitHub Pages in
  # repo settings and swap the upload-artifact step for actions/deploy-pages
  # (with pages/id-token permissions + a github-pages environment).
  # site/build.py renders neutral evidence only; interpreted verdicts show for
  # cleared (public:true) targets and stay "withheld" otherwise.
  site:
    needs: probe
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Render site
        run: |
          pip install pyyaml
          python site/build.py --data data --out site/dist
      - uses: actions/upload-artifact@v4
        with:
          name: observatory-site
          path: site/dist
